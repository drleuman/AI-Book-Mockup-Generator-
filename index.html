<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF--8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mockup Workstation | Print Price Pro v2.5</title>

  <!-- Editorial and Technical Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            monolith: {
              canvas: '#050505',
              surface: '#121212',
              elevated: '#1A1A1A',
              border: '#2A2A2A',
              signal: '#FF1A1A', // Sharp Signal Red
              text: {
                primary: '#E0E0E0',
                secondary: '#A0A0A0',
                muted: '#606060'
              }
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          },
          borderRadius: {
            'none': '0',
            'sm': '0',
            'md': '0',
            'lg': '0',
            'xl': '0',
            '2xl': '0',
            '3xl': '0',
            'full': '0', // Enforcing strict 0px radius
          }
        }
      }
    }
  </script>
  <style type="text/css">
    /* Global Resets and Monolith Surface */
    body {
      background-color: #050505;
      color: #E0E0E0;
      -webkit-font-smoothing: antialiased;
    }

    /* Control surface inputs */
    input,
    select,
    button {
      border-radius: 0 !important;
    }

    /* Transitions */
    .transition-monolith {
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Custom Scrollbar for Workstation Feel */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #050505;
    }

    ::-webkit-scrollbar-thumb {
      background: #2A2A2A;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3A3A3A;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.21.0",
    "jszip": "https://aistudiocdn.com/jszip@^3.10.1"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
